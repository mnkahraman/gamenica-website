<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GAMENICA – Applications And Games Studio</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1d1d1f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
    }
    .logo {
      font-size: 2.6rem;
      font-weight: 900;
      letter-spacing: 6px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .sub {
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.4;
      margin-bottom: 60px;
    }
    .tagline {
      font-size: 1.1rem;
      opacity: 0.6;
      max-width: 400px;
      line-height: 1.7;
      margin-bottom: 48px;
    }
    nav a {
      display: inline-block;
      margin: 0 12px;
      font-size: 0.85rem;
      font-weight: 600;
      color: rgba(255,255,255,0.45);
      text-decoration: none;
      letter-spacing: 0.5px;
      transition: color 0.2s;
    }
    nav a:hover { color: #fff; }
    footer {
      position: fixed;
      bottom: 24px;
      font-size: 0.78rem;
      opacity: 0.25;
    }
  </style>
</head>
<body>
  <div class="logo">GAMENICA</div>
  <div class="sub">Applications And Games Studio</div>
  <p class="tagline">We craft thoughtful mobile apps and games for iOS and Android.</p>
  <nav>
    <a href="/privacy-policy/">Privacy Policy</a>
  </nav>
  <footer>&copy; 2026 GAMENICA. All rights reserved.</footer>
</body>
</html>
